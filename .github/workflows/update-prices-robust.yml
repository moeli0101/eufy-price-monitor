name: Update Prices Daily (Robust)

on:
  schedule:
    - cron: '0 18 * * *'  # 每天UTC 18:00
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 设置超时，避免无限等待

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史，避免浅克隆问题

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests beautifulsoup4

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          playwright install --with-deps chromium

      - name: Ensure Playwright is ready
        run: |
          playwright install chromium

      - name: Run price refresh script with error handling
        id: scrape
        continue-on-error: true
        run: |
          cd price_monitor
          python daily_price_refresh.py 2>&1 | tee scrape.log

          # 检查是否生成了文件
          if [ ! -f price_history.json ]; then
            echo "ERROR: price_history.json not generated"
            exit 1
          fi

          if [ ! -f price_results_latest.json ]; then
            echo "ERROR: price_results_latest.json not generated"
            exit 1
          fi

      - name: Check scrape results
        if: steps.scrape.outcome == 'failure'
        run: |
          echo "⚠️ 抓取失败，查看日志："
          cat price_monitor/scrape.log
          echo "尝试使用昨天的数据..."
          exit 1

      - name: Auto discover new products
        continue-on-error: true
        run: |
          cd price_monitor
          python auto_discover.py 2>&1 | tee discover.log
          echo "✅ 新品发现完成"

      - name: Copy data to docs (with error handling)
        run: |
          cd price_monitor

          # 确保docs目录存在
          mkdir -p docs

          # 复制文件，如果失败则记录但不中断
          cp price_history.json docs/ || echo "⚠️ Failed to copy price_history.json"
          cp promotions.json docs/ || echo "⚠️ Failed to copy promotions.json"
          cp price_results_latest.json docs/ || echo "⚠️ Failed to copy price_results_latest.json"

          echo "✅ 数据文件已复制到docs目录"

      - name: Verify data files
        run: |
          cd price_monitor/docs

          # 检查文件是否存在且不为空
          for file in price_history.json promotions.json price_results_latest.json; do
            if [ ! -f "$file" ]; then
              echo "❌ 文件不存在: $file"
              exit 1
            fi

            size=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file")
            if [ "$size" -lt 100 ]; then
              echo "❌ 文件太小可能损坏: $file ($size bytes)"
              exit 1
            fi

            echo "✅ $file: $size bytes"
          done

      - name: Generate standalone HTML
        continue-on-error: true
        run: |
          cd price_monitor
          python << 'EOF'
          import json
          from datetime import datetime
          import sys

          try:
              # 读取包含tracker功能的完整dashboard HTML
              with open('price_dashboard_with_tracker.html', 'r', encoding='utf-8') as f:
                  html = f.read()

              # 读取最新JSON数据
              with open('price_results_latest.json', 'r', encoding='utf-8') as f:
                  data = json.load(f)

              # 验证数据
              if not data or len(data) < 10:
                  print(f"⚠️ 数据太少，只有 {len(data)} 个产品")
                  sys.exit(1)

              # 生成新的JSON数据
              json_data = json.dumps(data, ensure_ascii=False, indent=2)

              # 使用正则表达式替换数据数组（保留tracker功能不被破坏）
              import re
              pattern = r'(async function loadData\(\) \{\s*try \{\s*// 数据直接内嵌在页面中\s*const data = )\[[\s\S]*?\];'
              replacement = r'\1' + json_data + ';'
              html = re.sub(pattern, replacement, html, count=1)

              # 验证替换成功
              if 'const data = [' not in html:
                  print("⚠️ 警告：数据替换可能失败")
                  sys.exit(1)

              # 添加更新时间
              update_time = datetime.now().strftime("%Y-%m-%d %H:%M:%S")
              html = html.replace('</body>', f'<!-- 最后更新: {update_time} -->\n</body>')

              # 保存到docs目录
              with open('docs/index.html', 'w', encoding='utf-8') as f:
                  f.write(html)

              print(f"✅ Dashboard已生成（{update_time}）")
              print(f"✅ 包含 {len(data)} 个产品")

          except Exception as e:
              print(f"❌ 生成HTML失败: {e}")
              sys.exit(1)
          EOF

      - name: Copy to root docs for GitHub Pages
        run: |
          # 确保根目录docs文件夹存在
          mkdir -p docs

          # 从price_monitor/docs复制所有文件到根docs/
          cp price_monitor/docs/index.html docs/
          cp price_monitor/docs/*.json docs/ || echo "⚠️ 部分JSON文件复制失败"

          echo "✅ 文件已复制到根目录docs/文件夹用于GitHub Pages部署"

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # 添加文件
          git add price_monitor/docs/ price_monitor/*.json price_monitor/*.log docs/ 2>/dev/null || true

          # 检查是否有变化
          if git diff --staged --quiet; then
            echo "📊 没有数据变化，跳过提交"
            exit 0
          fi

          # 提交
          git commit -m "🤖 Auto update prices $(date +'%Y-%m-%d %H:%M')" || exit 0

          # 推送（最多重试3次）
          for i in 1 2 3; do
            if git push; then
              echo "✅ 推送成功"
              exit 0
            else
              echo "⚠️ 推送失败，重试 $i/3..."
              git pull --rebase
              sleep 5
            fi
          done

          echo "❌ 推送失败，已重试3次"
          exit 1

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-logs
          path: |
            price_monitor/scrape.log
            price_monitor/bot_debug.log
          retention-days: 7

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ 价格抓取失败 (${date})`,
              body: `自动价格抓取在 ${date} 失败。请检查 [workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId})。`,
              labels: ['automation', 'bug']
            });
