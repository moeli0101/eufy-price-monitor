name: Update Prices Daily

on:
  schedule:
    - cron: '0 18 * * *'  # 每天UTC 18:00 (澳洲东部时间凌晨2-4点)
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write  # 允许workflow push到仓库
    
jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          playwright install --with-deps chromium

      - name: Run price refresh script
        run: |
          cd price_monitor
          python daily_price_refresh.py

      - name: Copy data to docs
        run: |
          cd price_monitor
          cp price_history.json docs/
          cp promotions.json docs/
          cp price_results_latest.json docs/
          echo "✅ 数据文件已复制到docs目录"

      - name: Generate standalone HTML
        run: |
          cd price_monitor
          python << 'EOF'
          import json
          from datetime import datetime

          # 读取dashboard HTML
          with open('price_dashboard_v6.html', 'r', encoding='utf-8') as f:
              html = f.read()

          # 读取最新JSON数据
          with open('price_results_latest.json', 'r', encoding='utf-8') as f:
              data = json.load(f)

          # 替换fetch调用为内嵌数据
          json_data = json.dumps(data, ensure_ascii=False, indent=2)

          old_code = '''        async function loadData() {
                      try {
                          // 添加时间戳防止缓存
                          const response = await fetch(`price_results_latest.json?t=${new Date().getTime()}`);
                          const data = await response.json();'''

          new_code = f'''        async function loadData() {{
                      try {{
                          // 数据直接内嵌在页面中
                          const data = {json_data};'''

          html = html.replace(old_code, new_code)

          # 添加更新时间
          update_time = datetime.now().strftime("%Y-%m-%d %H:%M:%S")
          html = html.replace('</body>', f'<!-- 最后更新: {update_time} -->\n</body>')

          # 保存到docs目录
          with open('docs/index.html', 'w', encoding='utf-8') as f:
              f.write(html)

          print(f"✅ Dashboard已生成（{update_time}）")
          EOF

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add price_monitor/docs/index.html price_monitor/docs/price_history.json price_monitor/docs/promotions.json price_monitor/docs/price_results_latest.json price_monitor/price_results_latest.json price_monitor/price_history.json price_monitor/promotions.json price_monitor/price_refresh_log.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto update prices $(date +'%Y-%m-%d')" && git push)
