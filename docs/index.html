        // 计算本周价格异动
        function calculateWeeklyChanges(data, useTrackerHistory = false) {
            const now = new Date();
            const sevenDaysAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);

            let decreased = 0;
            let increased = 0;
            let newPromo = 0;
            const decreaseAmounts = [];

            // 保存具体的产品列表
            const decreasedProducts = [];
            const increasedProducts = [];
            const newPromoProducts = [];

            data.forEach(product => {
                let history = null;
                let productName = '';
                let productUrl = '';

                // 根据数据源获取历史数据
                if (useTrackerHistory) {
                    // 价格追踪页面：使用trackerHistory
                    if (!trackerHistory[product.id] || !trackerHistory[product.id].price_history || trackerHistory[product.id].price_history.length === 0) {
                        return;
                    }
                    history = trackerHistory[product.id].price_history;
                    productName = product.product_name;
                    productUrl = product.url;
                } else {
                    // 产品列表页面：使用product.history_data
                    if (!product.history_data || product.history_data.length === 0) {
                        return;
                    }
                    history = product.history_data;
                    productName = product.name;
                    productUrl = product.url;
                }

                // 只查看过去7天内的历史记录，找出价格变化
                const recentHistory = history.filter(record => {
                    const recordDate = new Date(record.date);
                    return recordDate >= sevenDaysAgo;
                });

                // 如果过去7天没有记录，跳过
                if (recentHistory.length === 0) {
                    return;
                }

                // 按日期排序
                recentHistory.sort((a, b) => new Date(a.date) - new Date(b.date));

                // 获取起始和结束的数据
                const startRecord = recentHistory[0];
                const endRecord = recentHistory[recentHistory.length - 1];

                let changeStartDate = startRecord.date;
                let changeEndDate = endRecord.date;

                // 检查MSRP（original_price）变化 - 这是真正的降价/涨价
                const oldMSRP = startRecord.original_price || startRecord.price;
                const newMSRP = endRecord.original_price || endRecord.price;
                const oldSalePrice = startRecord.price;
                const newSalePrice = endRecord.price;

                // 检查价格是否有效
                if (oldMSRP === null || oldMSRP === undefined || isNaN(oldMSRP) ||
                    newMSRP === null || newMSRP === undefined || isNaN(newMSRP) ||
                    oldSalePrice === null || oldSalePrice === undefined || isNaN(oldSalePrice) ||
                    newSalePrice === null || newSalePrice === undefined || isNaN(newSalePrice)) {
                    return;
                }

                // 检查过去7天内是否有MSRP变化
                let hasMSRPChange = false;
                for (let i = 1; i < recentHistory.length; i++) {
                    const prevMSRP = recentHistory[i-1].original_price || recentHistory[i-1].price;
                    const currMSRP = recentHistory[i].original_price || recentHistory[i].price;
                    if (currMSRP !== prevMSRP) {
                        hasMSRPChange = true;
                        break;
                    }
                }

                // 如果MSRP没变，检查是否有促销变化
                let hasPromoChange = false;
                for (let i = 1; i < recentHistory.length; i++) {
                    const prevPromo = recentHistory[i-1].is_on_sale || false;
                    const currPromo = recentHistory[i].is_on_sale || false;
                    if (currPromo !== prevPromo) {
                        hasPromoChange = true;
                        break;
                    }
                }

                // 如果既没有MSRP变化，也没有促销变化，跳过
                if (!hasMSRPChange && !hasPromoChange) {
                    return;
                }

                // 1. 统计MSRP变化（降价/涨价）
                if (hasMSRPChange) {
                    if (newMSRP < oldMSRP) {
                        decreased++;
                        const decrease = oldMSRP - newMSRP;
                        decreaseAmounts.push(decrease);
                        decreasedProducts.push({
                            name: productName,
                            url: productUrl,
                            oldPrice: oldMSRP,
                            newPrice: newMSRP,
                            decrease: decrease,
                            startDate: changeStartDate,
                            endDate: changeEndDate
                        });
                    } else if (newMSRP > oldMSRP) {
                        increased++;
                        increasedProducts.push({
                            name: productName,
                            url: productUrl,
                            oldPrice: oldMSRP,
                            newPrice: newMSRP,
                            increase: newMSRP - oldMSRP,
                            startDate: changeStartDate,
                            endDate: changeEndDate
                        });
                    }
                }
                // 2. 统计新增促销（MSRP不变，但新增了促销折扣）
                else if (hasPromoChange) {
                    const oldPromoStatus = startRecord.is_on_sale || false;
                    const newPromoStatus = endRecord.is_on_sale || false;

                    if (newPromoStatus && !oldPromoStatus) {
                        newPromo++;
                        newPromoProducts.push({
                            name: productName,
                            url: productUrl,
                            price: newSalePrice,
                            msrp: newMSRP,
                            discount: newMSRP - newSalePrice,
                            startDate: changeStartDate,
                            endDate: changeEndDate
                        });
                    }
                }
            });

            const total = decreased + increased + newPromo;
            const avgDecrease = decreaseAmounts.length > 0
                ? decreaseAmounts.reduce((a, b) => a + b, 0) / decreaseAmounts.length
                : 0;
            const maxDecrease = decreaseAmounts.length > 0
                ? Math.max(...decreaseAmounts)
                : 0;

            // 按降幅排序（降价最多的在前）
            decreasedProducts.sort((a, b) => b.decrease - a.decrease);
            increasedProducts.sort((a, b) => b.increase - a.increase);

            return {
                decreased,
                increased,
                newPromo,
                total,
                avgDecrease,
                maxDecrease,
                decreasedProducts,
                increasedProducts,
                newPromoProducts
            };
        }

        function applyFilters() {
            const validData = allData.filter(p => p.status === 'success' && p.price);

            let filtered = validData.filter(product => {
                // 品牌筛选
                if (currentFilters.brand !== 'all') {
                    if ((product.brand || 'eufy').toLowerCase() !== currentFilters.brand.toLowerCase()) {
                        return false;
                    }
                }

                // 品类筛选
                if (currentFilters.category !== 'all') {
                    const productCategory = product.category || 'Security Camera';
                    if (productCategory !== currentFilters.category) {
                        return false;
                    }
                }

                // 价格筛选
                if (currentFilters.price !== 'all') {
                    const [min, max] = currentFilters.price.split('-').map(Number);
                    if (product.price < min || product.price >= max) {
                        return false;
                    }
                }

                return true;
            });

            updateStats(filtered);
            updateCategories(filtered);
        }

        function updateStats(data) {
            const cameras = data.filter(p => (p.category || 'Security Camera') === 'Security Camera');
            const doorbells = data.filter(p => p.category === 'Video Doorbell');
            const locks = data.filter(p => p.category === 'Smart Lock');

            document.querySelector('.stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${data.length}</div>
                    <div class="stat-label">显示产品</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" style="color: #2196f3">${cameras.length}</div>
                    <div class="stat-label">📷 Camera</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" style="color: #ff9800">${doorbells.length}</div>
                    <div class="stat-label">🔔 Doorbell</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" style="color: #9c27b0">${locks.length}</div>
                    <div class="stat-label">🔐 Lock</div>
                </div>
            `;
        }

        function updateCategories(data) {
            const categories = {
                'Security Camera': { icon: '📷', products: [] },
                'Video Doorbell': { icon: '🔔', products: [] },
                'Smart Lock': { icon: '🔐', products: [] },
                'Baby': { icon: '🍼', products: [] }
            };

            data.forEach(product => {
                const cat = product.category || 'Security Camera';
                if (categories[cat]) {
                    categories[cat].products.push(product);
                }
            });

            const categoriesHTML = Object.entries(categories)
                .filter(([_, info]) => info.products.length > 0)
                .map(([categoryName, info]) => renderCategory(categoryName, info))
                .join('');

            document.querySelector('#categorySections').innerHTML = categoriesHTML || `
                <div class="no-results">
                    <h2>🔍 未找到符合条件的产品</h2>
                    <p style="margin-top: 10px">试试调整筛选条件</p>
                </div>
            `;
        }

        function renderCategory(categoryName, info) {
            const products = info.products.sort((a, b) => a.price - b.price);

            // 按价格区间分组
            const priceBands = {
                '$0-$200': products.filter(p => p.price < 200),
                '$200-$400': products.filter(p => p.price >= 200 && p.price < 400),
                '$400-$700': products.filter(p => p.price >= 400 && p.price < 700),
                '$700-$1200': products.filter(p => p.price >= 700 && p.price < 1200),
                '$1200+': products.filter(p => p.price >= 1200)
            };

            const bandsHTML = Object.entries(priceBands)
                .filter(([_, prods]) => prods.length > 0)
                .map(([bandName, prods]) => `
                    <div class="price-band">
                        <div class="band-title">${bandName} (${prods.length}款)</div>
                        <div class="product-grid">
                            ${prods.map(product => renderProductCard(product)).join('')}
                        </div>
                    </div>
                `).join('');

            return `
                <div class="category-section">
                    <div class="category-header">
                        <div class="category-title">
                            <span class="category-icon">${info.icon}</span>
                            <span class="category-name">${categoryName}</span>
                        </div>
                        <span class="category-count">${products.length} 款产品</span>
                    </div>
                    ${bandsHTML}
                </div>
            `;
        }

        function renderProductCard(product) {
            const brandClass = (product.brand || 'eufy').toLowerCase().replace(' ', '-');
            const hasDiscount = product.was_price && product.was_price > product.price;
            const priceClass = hasDiscount ? '' : 'no-discount';

            return `
                <div class="product-card ${brandClass}" onclick="window.open('${product.url}', '_blank')">
                    <div class="product-top">
                        <span class="brand-badge ${brandClass}">${product.brand || 'eufy'}</span>
                        ${hasDiscount ? `<span class="discount-badge">${product.discount_percent}% OFF</span>` : ''}
                    </div>
                    <div class="product-name">${product.name}</div>
                    <div class="product-bottom">

    <script>
        // Tab 切换函数
        function switchTab(tabName) {
            // 隐藏所有 Tab
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // 显示选中的 Tab
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');

            // 如果切换到价格追踪，加载数据
            if (tabName === 'tracker' && !window.trackerLoaded) {
                loadTrackerData();
                window.trackerLoaded = true;
            }
        }

        // 价格追踪功能
        let trackerAllProducts = [];
        let trackerHistory = {};
        let trackerSelectedProducts = [];
        let trackerChart = null;
        const trackerColors = ['#3498db', '#2ecc71', '#e74c3c', '#f39c12', '#9b59b6'];
        let trackerFilters = {
            brand: 'all',
            category: 'all',
            status: 'all',
            timeRange: 'all'  // 时间范围筛选
        };

        // 加载数据
        async function loadTrackerData() {
            try {
                // 加载价格历史数据
                const historyResponse = await fetch('price_history.json');
                trackerHistory = await historyResponse.json();

                // 加载最新产品数据
                const productsResponse = await fetch('price_results_latest.json');
                const rawProducts = await productsResponse.json();

                // 标准化产品数据格式并添加ID
                trackerAllProducts = rawProducts.map(product => {
                    // 根据产品名称和品牌生成ID（与price_history的key匹配）
                    let cleanName = product.name.toLowerCase()
                        .replace(/[ \-\/\(\),\.&]/g, '_')
                        .replace(/_+/g, '_')
                        .replace(/^_+|_+$/g, '');
                    if (cleanName.length > 60) cleanName = cleanName.substring(0, 60);
                    const id = product.brand.toLowerCase() + '_' + cleanName;

                    // 从price_history获取is_on_sale信息
                    let isOnSale = false;
                    if (trackerHistory[id] && trackerHistory[id].price_history.length > 0) {
                        const latestHistory = trackerHistory[id].price_history[trackerHistory[id].price_history.length - 1];
                        isOnSale = latestHistory.is_on_sale || false;
                    }

                    return {
                        id: id,
                        product_name: product.name,
                        brand: product.brand,
                        category: product.category,
                        url: product.url,
                        current_price: product.price,
                        is_on_sale: isOnSale
                    };
                });

                // 更新顶部横幅数据
                updateBannerInfo();

                // 初始化筛选器
                initTrackerFilters();

                // 渲染产品卡片
                renderTrackerProducts();
            } catch (error) {
                console.error('数据加载失败:', error);
                document.getElementById('tracker-productCards').innerHTML = `
                    <div style="padding: 40px; text-align: center; color: #e74c3c; grid-column: 1 / -1;">
                        <p style="font-size: 18px; margin-bottom: 10px;">⚠️ 数据加载失败</p>
                        <p style="font-size: 14px; color: #666;">${error.message}</p>
                    </div>
                `;
            }
        }

        // 初始化筛选器
        function initTrackerFilters() {
            // 获取所有唯一的品牌和类别
            const brands = [...new Set(trackerAllProducts.map(p => p.brand))].sort();
            const categories = [...new Set(trackerAllProducts.map(p => p.category))].sort();

            // 渲染品牌筛选按钮
            const brandFiltersContainer = document.getElementById('trackerBrandFilters');
            brandFiltersContainer.innerHTML = `
                <button class="filter-btn active" data-brand="all">全部品牌</button>
                ${brands.map(brand => `<button class="filter-btn" data-brand="${brand}">${brand}</button>`).join('')}
            `;

            // 渲染类别筛选按钮
            const categoryFiltersContainer = document.getElementById('trackerCategoryFilters');
            categoryFiltersContainer.innerHTML = `
                <button class="filter-btn active" data-category="all">全部类别</button>
                ${categories.map(category => `<button class="filter-btn" data-category="${category}">${category}</button>`).join('')}
            `;

            // 绑定筛选事件
            brandFiltersContainer.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    brandFiltersContainer.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    trackerFilters.brand = this.dataset.brand;
                    applyTrackerFilters();
                });
            });

            categoryFiltersContainer.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    categoryFiltersContainer.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    trackerFilters.category = this.dataset.category;
                    applyTrackerFilters();
                });
            });

            document.getElementById('trackerStatusFilters').querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.getElementById('trackerStatusFilters').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    trackerFilters.status = this.dataset.status;
                    applyTrackerFilters();
                });
            });

            // 时间范围筛选器
            document.getElementById('trackerTimeFilters').querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.getElementById('trackerTimeFilters').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    trackerFilters.timeRange = this.dataset.days;
                    updateTrackerChart();  // 直接更新图表
                });
            });
        }

        // 更新价格追踪页面的异动统计
        function updateTrackerStats() {
            const filteredProducts = getFilteredProducts();
            const weeklyChanges = calculateWeeklyChanges(filteredProducts, true);

            // 构建筛选器描述
            let filterTitle = '📊 本周价格异动';
            let filterSubtitle = '过去7天的价格变化统计';

            if (trackerFilters.brand !== 'all' || trackerFilters.category !== 'all') {
                const parts = [];
                if (trackerFilters.brand !== 'all') {
                    // 首字母大写
                    const brandName = trackerFilters.brand.charAt(0).toUpperCase() + trackerFilters.brand.slice(1);
                    parts.push(brandName);
                }
                if (trackerFilters.category !== 'all') {
                    parts.push(trackerFilters.category);
                }
                filterTitle = `📊 ${parts.join(' ')} 本周价格异动`;
                filterSubtitle = `${parts.join(' ')} 产品过去7天的价格变化`;
            }

            // 格式化日期为 MM/DD 格式
            const formatDate = (dateStr) => {
                if (!dateStr) return '';
                const date = new Date(dateStr);
                return `${date.getMonth() + 1}/${date.getDate()}`;
            };

            // 生成产品列表HTML
            const generateProductList = (products, type) => {
                if (products.length === 0) {
                    return '<div class="empty-list">😊 本周暂无变动</div>';
                }

                return products.slice(0, 10).map(product => {
                    const dateRange = product.startDate && product.endDate
                        ? `<div style="color: #999; font-size: 11px; margin-top: 4px;">📅 ${formatDate(product.startDate)} → ${formatDate(product.endDate)}</div>`
                        : '';

                    if (type === 'decreased') {
                        return `
                            <div class="product-item">
                                <a href="${product.url}" target="_blank" class="product-name">${product.name}</a>
                                <div class="product-price-change">
                                    <span><span class="price-old">$${product.oldPrice}</span> → <span class="price-new">$${product.newPrice}</span></span>
                                    <span class="price-diff down">-$${product.decrease.toFixed(2)}</span>
                                </div>
                                ${dateRange}
                            </div>
                        `;
                    } else if (type === 'increased') {
                        return `
                            <div class="product-item">
                                <a href="${product.url}" target="_blank" class="product-name">${product.name}</a>
                                <div class="product-price-change">
                                    <span><span class="price-old">$${product.oldPrice}</span> → <span class="price-new">$${product.newPrice}</span></span>
                                    <span class="price-diff up">+$${product.increase.toFixed(2)}</span>
                                </div>
                                ${dateRange}
                            </div>
                        `;
                    } else {
                        // 促销产品
                        const discountText = product.discount ? `-$${product.discount.toFixed(2)}` : '🔥';
                        return `
                            <div class="product-item">
                                <a href="${product.url}" target="_blank" class="product-name">${product.name}</a>
                                <div class="product-price-change">
                                    <span>${product.msrp ? `<span class="price-old">$${product.msrp}</span> → ` : ''}<span class="price-new">$${product.price}</span></span>
                                    <span class="price-diff down">${discountText}</span>
                                </div>
                                ${dateRange}
                            </div>
                        `;
                    }
                }).join('');
            };

            // 使用固定的"过去7天"（每天自动更新）
            const today = new Date();
            const sevenDaysAgo = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
            const timeRangeText = `${formatDate(sevenDaysAgo)} - ${formatDate(today)}`;

            const statsContainer = document.getElementById('tracker-stats-container');
            statsContainer.innerHTML = `
                <div style="text-align: center; margin-bottom: 15px; padding: 12px; background: #f8f9ff; border-radius: 8px; border: 1px solid #e8ebf7;">
                    <span style="color: #667eea; font-weight: 600; font-size: 14px;">📅 统计时间范围：${timeRangeText} (过去7天)</span>
                </div>
                <div class="stats" style="margin-bottom: 20px;">
                    <div class="stat-card">
                        <div class="stat-number">${filteredProducts.length}</div>
                        <div class="stat-label">筛选产品</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" style="color: #4caf50">${weeklyChanges.decreased}</div>
                        <div class="stat-label">🔻 MSRP降价</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" style="color: #ff5722">${weeklyChanges.increased}</div>
                        <div class="stat-label">🔺 MSRP涨价</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" style="color: #ff9800">${weeklyChanges.newPromo}</div>
                        <div class="stat-label">🏷️ 新促销</div>
                    </div>
                </div>

                <div class="price-changes-container">
                    <div class="change-section">
                        <div class="change-section-header decreased">
                            🔻 MSRP降价
                            <span style="font-size: 14px; color: #999;">(${weeklyChanges.decreased}个)</span>
                        </div>
                        <div style="font-size: 11px; color: #999; margin-bottom: 10px;">建议零售价降低</div>
                        <div class="product-list">
                            ${generateProductList(weeklyChanges.decreasedProducts, 'decreased')}
                        </div>
                    </div>

                    <div class="change-section">
                        <div class="change-section-header increased">
                            🔺 MSRP涨价
                            <span style="font-size: 14px; color: #999;">(${weeklyChanges.increased}个)</span>
                        </div>
                        <div style="font-size: 11px; color: #999; margin-bottom: 10px;">建议零售价上涨</div>
                        <div class="product-list">
                            ${generateProductList(weeklyChanges.increasedProducts, 'increased')}
                        </div>
                    </div>

                    <div class="change-section">
                        <div class="change-section-header promo">
                            🏷️ 新增促销
                            <span style="font-size: 14px; color: #999;">(${weeklyChanges.newPromo}个)</span>
                        </div>
                        <div style="font-size: 11px; color: #999; margin-bottom: 10px;">MSRP不变，新增折扣</div>
                        <div class="product-list">
                            ${generateProductList(weeklyChanges.newPromoProducts, 'promo')}
                        </div>
                    </div>
                </div>
            `;
        }

        // 应用筛选并重新渲染
        function applyTrackerFilters() {
            updateTrackerStats();  // 更新异动统计
            renderTrackerProducts();
        }

        // 获取筛选后的产品列表
        function getFilteredProducts() {
            return trackerAllProducts.filter(product => {
                // 品牌筛选
                if (trackerFilters.brand !== 'all' && product.brand !== trackerFilters.brand) {
                    return false;
                }

                // 类别筛选
                if (trackerFilters.category !== 'all' && product.category !== trackerFilters.category) {
                    return false;
                }

                // 状态筛选
                if (trackerFilters.status === 'on-sale' && !product.is_on_sale) {
                    return false;
                }

                return true;
            });
        }

        // 更新顶部横幅信息
        function updateBannerInfo() {
            // 计算最新更新时间和累计天数
            let latestDate = null;
            let earliestDate = null;

            Object.values(trackerHistory).forEach(product => {
                if (product.price_history && product.price_history.length > 0) {
                    product.price_history.forEach(record => {
                        const date = new Date(record.date);
                        if (!latestDate || date > latestDate) latestDate = date;
                        if (!earliestDate || date < earliestDate) earliestDate = date;
                    });
                }
            });

            if (latestDate) {
                const year = latestDate.getFullYear();
                const month = String(latestDate.getMonth() + 1).padStart(2, '0');
                const day = String(latestDate.getDate()).padStart(2, '0');
                const hours = String(latestDate.getHours()).padStart(2, '0');
                const minutes = String(latestDate.getMinutes()).padStart(2, '0');
                document.getElementById('lastUpdateTime').textContent = `${year}-${month}-${day} ${hours}:${minutes}`;
            }

            if (earliestDate && latestDate) {
                const daysDiff = Math.floor((latestDate - earliestDate) / (1000 * 60 * 60 * 24)) + 1;
                document.getElementById('totalDays').textContent = daysDiff;
            }
        }

        // 渲染产品卡片
        function renderTrackerProducts() {
            const container = document.getElementById('tracker-productCards');
            const filteredProducts = getFilteredProducts();

            // 更新异动统计
            updateTrackerStats();

            // 更新产品数量显示
            document.getElementById('tracker-product-count').textContent = filteredProducts.length;

            if (trackerAllProducts.length === 0) {
                container.innerHTML = `
                    <div style="padding: 40px; text-align: center; color: #95a5a6; grid-column: 1 / -1;">
                        <p style="font-size: 18px;">😊 暂无产品数据</p>
                    </div>
                `;
                return;
            }

            if (filteredProducts.length === 0) {
                container.innerHTML = `
                    <div style="padding: 40px; text-align: center; color: #95a5a6; grid-column: 1 / -1;">
                        <p style="font-size: 18px;">😊 没有符合筛选条件的产品</p>
                        <p style="font-size: 14px; color: #666; margin-top: 10px;">请调整筛选条件</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredProducts.map(product => {
                const isSelected = trackerSelectedProducts.some(p => p.id === product.id);
                const hasHistory = trackerHistory[product.id] && trackerHistory[product.id].price_history.length > 0;

                return `
                    <div class="tracker-card ${isSelected ? 'selected' : ''}"
                         onclick="toggleProductSelection('${product.id}')"
                         style="${!hasHistory ? 'opacity: 0.5; cursor: not-allowed;' : ''}">
                        <div class="tracker-card-header">
                            <a href="${product.url}"
                               target="_blank"
                               class="tracker-card-title"
                               style="text-decoration: none; color: inherit; cursor: pointer;"
                               onclick="event.stopPropagation();">${product.product_name}</a>
                            <div class="tracker-card-checkbox"></div>
                        </div>
                        <div class="tracker-card-info">
                            <span>🏷️ ${product.brand}</span>
                            <span>📦 ${product.category}</span>
                        </div>
                        <div class="tracker-card-price ${product.is_on_sale ? 'on-sale' : ''}">
                            $${product.current_price}${product.is_on_sale ? ' 🔥' : ''}
                        </div>
                        ${!hasHistory ? '<div style="font-size: 11px; color: #ff9800; margin-top: 5px;">📊 新产品，数据积累中...</div>' : ''}
                    </div>
                `;
            }).join('');

            if (document.getElementById('tracker-dropdown-list')) {
                const query = document.getElementById('tracker-search-input') ? document.getElementById('tracker-search-input').value : '';
                filterTrackerDropdown(query);
                renderSelectedTags();
            }
        }

        // 切换产品选择
        function toggleProductSelection(productId) {
            const product = trackerAllProducts.find(p => p.id === productId);
            const hasHistory = trackerHistory[productId] && trackerHistory[productId].price_history.length > 0;

            if (!product || !hasHistory) return;

            const index = trackerSelectedProducts.findIndex(p => p.id === productId);

            if (index > -1) {
                // 取消选择
                trackerSelectedProducts.splice(index, 1);
            } else {
                // 添加选择（最多5个）
                if (trackerSelectedProducts.length >= 5) {
                    alert('最多只能同时对比5个产品');
                    return;
                }
                trackerSelectedProducts.push(product);
            }

            // 重新渲染产品卡片
            renderTrackerProducts();

            // 更新图表
            updateTrackerChart();

            // 显示/隐藏导出按钮
            document.getElementById('export-buttons').style.display =
                trackerSelectedProducts.length > 0 ? 'flex' : 'none';
        }

        // 更新图表
        function updateTrackerChart() {
            const container = document.getElementById('tracker-chartContainer');

            if (trackerSelectedProducts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📈</div>
                        <p>请选择产品开始追踪价格变化</p>
                    </div>
                `;
                if (trackerChart) {
                    trackerChart.destroy();
                    trackerChart = null;
                }
                return;
            }

            // 创建canvas（如果不存在）
            if (!container.querySelector('canvas')) {
                container.innerHTML = '<canvas id="trackerPriceChart"></canvas>';
            }

            const ctx = document.getElementById('trackerPriceChart').getContext('2d');

            // 准备数据集
            const datasets = trackerSelectedProducts.map((product, index) => {
                const history = trackerHistory[product.id];
                let priceHistory = history.price_history;

                // 应用时间范围筛选
                if (trackerFilters.timeRange !== 'all') {
                    const days = parseInt(trackerFilters.timeRange);
                    const cutoffDate = new Date();
                    cutoffDate.setDate(cutoffDate.getDate() - days);

                    priceHistory = priceHistory.filter(record => {
                        const recordDate = new Date(record.date);
                        return recordDate >= cutoffDate;
                    });
                }

                const data = priceHistory.map(record => ({
                    x: new Date(record.date),
                    y: record.price
                }));

                return {
                    label: product.product_name,
                    data: data,
                    borderColor: trackerColors[index % trackerColors.length],
                    backgroundColor: trackerColors[index % trackerColors.length] + '20',
                    borderWidth: 3,
                    fill: false,
                    tension: 0.1,
                    pointRadius: 4,
                    pointHoverRadius: 6
                };
            });

            // 销毁旧图表
            if (trackerChart) {
                trackerChart.destroy();
            }

            // 创建新图表
            trackerChart = new Chart(ctx, {
                type: 'line',
                data: { datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: {
                            display: true,
                            text: '价格趋势对比',
                            font: { size: 18, weight: 'bold' },
                            color: '#2c3e50'
                        },
                        legend: {
                            display: true,
                            position: 'top',
                            labels: {
                                font: { size: 12 },
                                padding: 15,
                                usePointStyle: true
                            }
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': $' + context.parsed.y.toFixed(2);
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                unit: 'day',
                                displayFormats: {
                                    day: 'MM/dd'
                                }
                            },
                            title: {
                                display: true,
                                text: '日期',
                                font: { size: 14, weight: 'bold' }
                            }
                        },
                        y: {
                            beginAtZero: false,
                            title: {
                                display: true,
                                text: '价格 (AUD)',
                                font: { size: 14, weight: 'bold' }
                            },
                            ticks: {
                                callback: function(value) {
                                    return '$' + value.toFixed(2);
                                }
                            }
                        }
                    },
                    interaction: {
                        mode: 'nearest',
                        axis: 'x',
                        intersect: false
                    }
                }
            });

            // 设置图表容器高度
            container.style.height = '500px';
        }

        // 导出数据
        function exportData(format) {
            if (trackerSelectedProducts.length === 0) {
                alert('请先选择要导出的产品');
                return;
            }

            let exportContent, filename, mimeType;

            if (format === 'json') {
                const exportData = {};
                trackerSelectedProducts.forEach(product => {
                    exportData[product.id] = {
                        product_name: product.product_name,
                        brand: product.brand,
                        category: product.category,
                        url: product.url,
                        price_history: trackerHistory[product.id].price_history
                    };
                });
                exportContent = JSON.stringify(exportData, null, 2);
                filename = 'price_data_' + new Date().toISOString().split('T')[0] + '.json';
                mimeType = 'application/json';
            } else if (format === 'csv') {
                const lines = ['产品名称,品牌,品类,日期,价格,原价,是否促销,折扣百分比'];

                trackerSelectedProducts.forEach(product => {
                    const history = trackerHistory[product.id].price_history;
                    history.forEach(record => {
                        lines.push([
                            `"${product.product_name}"`,
                            product.brand,
                            product.category,
                            record.date,
                            record.price,
                            record.original_price || record.price,
                            record.is_on_sale ? '是' : '否',
                            record.discount_percentage || 0
                        ].join(','));
                    });
                });

                exportContent = lines.join('\n');
                filename = 'price_data_' + new Date().toISOString().split('T')[0] + '.csv';
                mimeType = 'text/csv';
            }

            // 创建下载
            const blob = new Blob(['\ufeff' + exportContent], { type: mimeType + ';charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function filterTrackerDropdown(query) {
            const list = document.getElementById('tracker-dropdown-list');
            list.style.display = 'block';
            const products = getFilteredProducts().filter(p =>
                !query || p.product_name.toLowerCase().includes(query.toLowerCase()) ||
                p.brand.toLowerCase().includes(query.toLowerCase())
            );
            if (products.length === 0) {
                list.innerHTML = '<div style="padding:12px 16px;color:#999;font-size:13px;">无匹配产品</div>';
                return;
            }
            list.innerHTML = products.map(p => {
                const isSelected = trackerSelectedProducts.some(s => s.id === p.id);
                const hasHistory = trackerHistory[p.id] && trackerHistory[p.id].price_history.length > 0;
                const disabled = !hasHistory;
                return `<div onclick="${disabled ? '' : `selectFromDropdown('${p.id}')`}"
                    style="padding:10px 16px;cursor:${disabled ? 'not-allowed' : 'pointer'};display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #f0f0f0;opacity:${disabled ? 0.4 : 1};background:${isSelected ? '#eef2ff' : 'white'};"
                    onmouseover="if(!${disabled})this.style.background='${isSelected ? '#eef2ff' : '#f8f9ff'}'"
                    onmouseout="this.style.background='${isSelected ? '#eef2ff' : 'white'}'">
                    <div>
                        <div style="font-size:13px;color:#2c3e50;font-weight:600;">${p.product_name}</div>
                        <div style="font-size:11px;color:#888;margin-top:2px;">${p.brand} · ${p.category} · $${p.current_price || '--'}</div>
                    </div>
                    <span style="font-size:12px;color:${isSelected ? '#667eea' : (disabled ? '#ccc' : '#bbb')};font-weight:700;flex-shrink:0;margin-left:8px;">${isSelected ? '✓ 已选' : (disabled ? '积累中' : '+')}</span>
                </div>`;
            }).join('');
        }

        function selectFromDropdown(productId) {
            toggleProductSelection(productId);
            const query = document.getElementById('tracker-search-input').value;
            filterTrackerDropdown(query);
            renderSelectedTags();
        }

        function renderSelectedTags() {
            const container = document.getElementById('tracker-selected-tags');
            if (!container) return;
            if (trackerSelectedProducts.length === 0) { container.innerHTML = ''; return; }
            container.innerHTML = trackerSelectedProducts.map(p => `
                <div style="display:inline-flex;align-items:center;gap:6px;padding:5px 12px;background:#eef2ff;border:1px solid #667eea;border-radius:20px;font-size:12px;color:#667eea;font-weight:600;">
                    ${p.product_name.length > 35 ? p.product_name.substring(0, 35) + '…' : p.product_name}
                    <span onclick="selectFromDropdown('${p.id}')" style="cursor:pointer;color:#999;font-size:16px;line-height:1;margin-left:2px;">×</span>
                </div>`).join('');
        }

        document.addEventListener('click', function(e) {
            const input = document.getElementById('tracker-search-input');
            const list = document.getElementById('tracker-dropdown-list');
            if (list && input && !input.contains(e.target) && !list.contains(e.target)) {
                list.style.display = 'none';
            }
        });

    </script>

    <script>
        // 页面加载时自动初始化tracker数据
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                console.log('🚀 自动加载tracker数据...');
                loadTrackerData();
                window.trackerLoaded = true;
            });
        } else {
            // DOMContentLoaded已经触发
            console.log('🚀 页面已加载，立即加载tracker数据...');
            loadTrackerData();
            window.trackerLoaded = true;
        }
    </script>
