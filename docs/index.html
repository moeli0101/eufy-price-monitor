        function setupFilters() {
            document.getElementById('brandFilters').addEventListener('click', (e) => {
                if (e.target.classList.contains('filter-btn')) {
                    document.querySelectorAll('#brandFilters .filter-btn').forEach(btn => {
                        btn.classList.remove('active');
                    });
                    e.target.classList.add('active');
                    currentFilters.brand = e.target.dataset.brand;
                    applyFilters();
                }
            });

            document.getElementById('categoryFilters').addEventListener('click', (e) => {
                if (e.target.classList.contains('filter-btn')) {
                    document.querySelectorAll('#categoryFilters .filter-btn').forEach(btn => {
                        btn.classList.remove('active');
                    });
                    e.target.classList.add('active');
                    currentFilters.category = e.target.dataset.category;
                    applyFilters();
                }
            });

            document.getElementById('priceFilters').addEventListener('click', (e) => {
                if (e.target.classList.contains('filter-btn')) {
                    document.querySelectorAll('#priceFilters .filter-btn').forEach(btn => {
                        btn.classList.remove('active');
                    });
                    e.target.classList.add('active');
                    currentFilters.price = e.target.dataset.price;
                    applyFilters();
                }
            });
        }

        function clearAllFilters() {
            currentFilters = { brand: 'all', category: 'all', price: 'all' };

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.brand === 'all' || btn.dataset.category === 'all' || btn.dataset.price === 'all') {
                    btn.classList.add('active');
                }
            });

            applyFilters();
        }

        function applyFilters() {
            const validData = allData.filter(p => p.status === 'success' && p.price);

            let filtered = validData.filter(product => {
                // 品牌筛选
                if (currentFilters.brand !== 'all') {
                    if ((product.brand || 'eufy').toLowerCase() !== currentFilters.brand.toLowerCase()) {
                        return false;
                    }
                }

                // 品类筛选
                if (currentFilters.category !== 'all') {
                    const productCategory = product.category || 'Security Camera';
                    if (productCategory !== currentFilters.category) {
                        return false;
                    }
                }

                // 价格筛选
                if (currentFilters.price !== 'all') {
                    const [min, max] = currentFilters.price.split('-').map(Number);
                    if (product.price < min || product.price >= max) {
                        return false;
                    }
                }

                return true;
            });

            updateStats(filtered);
            updateCategories(filtered);
        }

        function updateStats(data) {
            const cameras = data.filter(p => (p.category || 'Security Camera') === 'Security Camera');
            const doorbells = data.filter(p => p.category === 'Video Doorbell');
            const locks = data.filter(p => p.category === 'Smart Lock');

            document.querySelector('.stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${data.length}</div>
                    <div class="stat-label">显示产品</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" style="color: #2196f3">${cameras.length}</div>
                    <div class="stat-label">📷 Camera</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" style="color: #ff9800">${doorbells.length}</div>
                    <div class="stat-label">🔔 Doorbell</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" style="color: #9c27b0">${locks.length}</div>
                    <div class="stat-label">🔐 Lock</div>
                </div>
            `;
        }

        function updateCategories(data) {
            const categories = {
                'Security Camera': { icon: '📷', products: [] },
                'Video Doorbell': { icon: '🔔', products: [] },
                'Smart Lock': { icon: '🔐', products: [] }
            };

            data.forEach(product => {
                const cat = product.category || 'Security Camera';
                if (categories[cat]) {
                    categories[cat].products.push(product);
                }
            });

            const categoriesHTML = Object.entries(categories)
                .filter(([_, info]) => info.products.length > 0)
                .map(([categoryName, info]) => renderCategory(categoryName, info))
                .join('');

            document.querySelector('#categorySections').innerHTML = categoriesHTML || `
                <div class="no-results">
                    <h2>🔍 未找到符合条件的产品</h2>
                    <p style="margin-top: 10px">试试调整筛选条件</p>
                </div>
            `;
        }

        function renderCategory(categoryName, info) {
            const products = info.products.sort((a, b) => a.price - b.price);

            // 按价格区间分组
            const priceBands = {
                '$0-$200': products.filter(p => p.price < 200),
                '$200-$400': products.filter(p => p.price >= 200 && p.price < 400),
                '$400-$700': products.filter(p => p.price >= 400 && p.price < 700),
                '$700-$1200': products.filter(p => p.price >= 700 && p.price < 1200),
                '$1200+': products.filter(p => p.price >= 1200)
            };

            const bandsHTML = Object.entries(priceBands)
                .filter(([_, prods]) => prods.length > 0)
                .map(([bandName, prods]) => `
                    <div class="price-band">
                        <div class="band-title">${bandName} (${prods.length}款)</div>
                        <div class="product-grid">
                            ${prods.map(product => renderProductCard(product)).join('')}
                        </div>
                    </div>
                `).join('');

            return `
                <div class="category-section">
                    <div class="category-header">
                        <div class="category-title">
                            <span class="category-icon">${info.icon}</span>
                            <span class="category-name">${categoryName}</span>
                        </div>
                        <span class="category-count">${products.length} 款产品</span>
                    </div>
                    ${bandsHTML}
                </div>
            `;
        }

        function renderProductCard(product) {
            const brandClass = (product.brand || 'eufy').toLowerCase().replace(' ', '-');
            const hasDiscount = product.was_price && product.was_price > product.price;
            const priceClass = hasDiscount ? '' : 'no-discount';

            return `
                <div class="product-card ${brandClass}" onclick="window.open('${product.url}', '_blank')">
                    <div class="product-top">
                        <span class="brand-badge ${brandClass}">${product.brand || 'eufy'}</span>
                        ${hasDiscount ? `<span class="discount-badge">${product.discount_percent}% OFF</span>` : ''}
                    </div>
                    <div class="product-name">${product.name}</div>
                    <div class="product-bottom">
                        <div class="product-meta">JB Hi-Fi</div>
                        <div class="product-prices">
                            ${hasDiscount ? `<div class="price-was">$${product.was_price.toFixed(0)}</div>` : ''}
                            <div class="price-current ${priceClass}">$${product.price.toFixed(0)}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderDashboard(data) {
            const validData = data.filter(p => p.status === 'success' && p.price);

            const statsHTML = '<div class="stats"></div>';
            const categoriesHTML = '<div id="categorySections"></div>';

            document.getElementById('app').innerHTML = statsHTML + categoriesHTML;

            updateStats(validData);
            updateCategories(validData);

            if (data[0] && data[0].scraped_at) {
                const updateTime = new Date(data[0].scraped_at).toLocaleString('zh-CN');
                document.getElementById('timestamp').textContent = `📅 最后更新: ${updateTime}`;
            }
        }

        loadData();
        setInterval(loadData, 30000);
    </script>

    <script>
        // Tab 切换函数
        function switchTab(tabName) {
            // 隐藏所有 Tab
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // 显示选中的 Tab
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');

            // 如果切换到促销日历，加载数据
            if (tabName === 'calendar' && !window.calendarLoaded) {
                initCalendar();
                window.calendarLoaded = true;
            }
        }

        // 促销日历功能
        let historyData = {};
        let selectedProducts = new Set();

        async function initCalendar() {
            try {
                const response = await fetch('price_history.json');
                historyData = await response.json();

                // 初始化控件
                const now = new Date();
                const yearSelect = document.getElementById('cal-year');
                const currentYear = now.getFullYear();
                
                for (let year = currentYear; year >= currentYear - 2; year--) {
                    const option = document.createElement('option');
                    option.value = year;
                    option.textContent = year + '年';
                    if (year === currentYear) option.selected = true;
                    yearSelect.appendChild(option);
                }

                document.getElementById('cal-month').value = now.getMonth() + 1;

                // 提取所有品牌
                const brands = new Set();
                Object.values(historyData).forEach(product => {
                    brands.add(product.brand);
                });

                const brandSelect = document.getElementById('cal-brand');
                Array.from(brands).sort().forEach(brand => {
                    const option = document.createElement('option');
                    option.value = brand;
                    option.textContent = brand;
                    brandSelect.appendChild(option);
                });

                // 渲染产品列表
                renderProductList();
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('calendar-container').innerHTML = `
                    <div class="empty-calendar">
                        <div class="empty-calendar-icon">📅</div>
                        <p>暂无历史数据，请等待系统首次运行后生成数据</p>
                    </div>
                `;
            }
        }

        function renderProductList() {
            const productList = document.getElementById('cal-product-list');
            productList.innerHTML = '';

            const brandFilter = document.getElementById('cal-brand').value;

            Object.entries(historyData).forEach(([productId, product]) => {
                if (brandFilter && product.brand !== brandFilter) return;

                const div = document.createElement('div');
                div.className = 'product-checkbox';

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.id = 'cal-' + productId;
                checkbox.checked = selectedProducts.has(productId);
                checkbox.onchange = () => {
                    if (checkbox.checked) {
                        selectedProducts.add(productId);
                    } else {
                        selectedProducts.delete(productId);
                    }
                    loadCalendar();
                };

                const label = document.createElement('label');
                label.htmlFor = 'cal-' + productId;
                label.textContent = product.product_name + ' (' + product.brand + ')';

                div.appendChild(checkbox);
                div.appendChild(label);
                productList.appendChild(div);
            });
        }

        function loadCalendar() {
            const container = document.getElementById('calendar-container');
            
            if (selectedProducts.size === 0) {
                container.innerHTML = `
                    <div class="empty-calendar">
                        <div class="empty-calendar-icon">📅</div>
                        <p>请选择至少一个产品查看促销日历</p>
                    </div>
                `;
                return;
            }

            const year = parseInt(document.getElementById('cal-year').value);
            const month = parseInt(document.getElementById('cal-month').value);
            const daysInMonth = new Date(year, month, 0).getDate();

            let html = '<table class="calendar-table"><thead><tr><th>产品</th>';
            for (let day = 1; day <= daysInMonth; day++) {
                html += `<th>${day}</th>`;
            }
            html += '</tr></thead><tbody>';

            selectedProducts.forEach(productId => {
                const product = historyData[productId];
                if (!product) return;

                html += '<tr>';
                html += `<td class="product-name" title="${product.product_name}">${product.product_name}</td>`;

                for (let day = 1; day <= daysInMonth; day++) {
                    const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const record = product.price_history.find(r => r.date === dateStr);

                    if (record && record.price) {
                        const cellClass = record.is_on_sale ? 'price-cell sale' : 'price-cell';
                        html += `<td class="${cellClass}">`;
                        html += `<div class="price-value">$${record.price}</div>`;
                        if (record.is_on_sale && record.discount_percentage > 0) {
                            html += `<div class="discount-badge">${record.discount_percentage}% OFF</div>`;
                        }
                        html += '</td>';
                    } else {
                        html += '<td class="no-data">-</td>';
                    }
                }

                html += '</tr>';
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // 品牌筛选变化时重新渲染产品列表
        document.addEventListener('DOMContentLoaded', () => {
            const brandSelect = document.getElementById('cal-brand');
            if (brandSelect) {
                brandSelect.addEventListener('change', renderProductList);
            }
        });
    </script>
