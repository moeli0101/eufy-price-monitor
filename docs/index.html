        function clearAllFilters() {
            currentFilters = { brand: 'all', category: 'all', price: 'all' };

            document.querySelectorAll('.filter-btn').forEach(btn => {

        function applyFilters() {
            const validData = allData.filter(p => p.status === 'success' && p.price);

            let filtered = validData.filter(product => {
                // 品牌筛选
                if (currentFilters.brand !== 'all') {
                    if ((product.brand || 'eufy').toLowerCase() !== currentFilters.brand.toLowerCase()) {
                        return false;
                    }
                }

                // 品类筛选
                if (currentFilters.category !== 'all') {
                    const productCategory = product.category || 'Security Camera';
                    if (productCategory !== currentFilters.category) {
                        return false;
                    }
                }

                // 价格筛选
                if (currentFilters.price !== 'all') {
                    const [min, max] = currentFilters.price.split('-').map(Number);
                    if (product.price < min || product.price >= max) {
                        return false;
                    }
                }

                return true;
            });

            updateStats(filtered);
            updateCategories(filtered);
        }

        function updateStats(data) {
            const cameras = data.filter(p => (p.category || 'Security Camera') === 'Security Camera');
            const doorbells = data.filter(p => p.category === 'Video Doorbell');
            const locks = data.filter(p => p.category === 'Smart Lock');

            document.querySelector('.stats').innerHTML = `

                    <div class="stat-label">🔐 Lock</div>
                </div>
            `;

        function updateCategories(data) {
            const categories = {
                'Security Camera': { icon: '📷', products: [] },
                'Video Doorbell': { icon: '🔔', products: [] },
                'Smart Lock': { icon: '🔐', products: [] },
                'Baby': { icon: '🍼', products: [] }
            };

            data.forEach(product => {
                const cat = product.category || 'Security Camera';
                if (categories[cat]) {
                    categories[cat].products.push(product);
                }
            });

            const categoriesHTML = Object.entries(categories)
                .filter(([_, info]) => info.products.length > 0)
                .map(([categoryName, info]) => renderCategory(categoryName, info))
                .join('');

            document.querySelector('#categorySections').innerHTML = categoriesHTML || `
                <div class="no-results">
                    <h2>🔍 未找到符合条件的产品</h2>
                    <p style="margin-top: 10px">试试调整筛选条件</p>
                </div>
            `;
        }

        function renderCategory(categoryName, info) {
            const products = info.products.sort((a, b) => a.price - b.price);

            // 按价格区间分组
            const priceBands = {
                '$0-$200': products.filter(p => p.price < 200),
                '$200-$400': products.filter(p => p.price >= 200 && p.price < 400),
                '$400-$700': products.filter(p => p.price >= 400 && p.price < 700),
                '$700-$1200': products.filter(p => p.price >= 700 && p.price < 1200),
                '$1200+': products.filter(p => p.price >= 1200)
            };

            const bandsHTML = Object.entries(priceBands)
                .filter(([_, prods]) => prods.length > 0)
                .map(([bandName, prods]) => `
                    <div class="price-band">
                        <div class="band-title">${bandName} (${prods.length}款)</div>
                        <div class="product-grid">
                            ${prods.map(product => renderProductCard(product)).join('')}
                        </div>
                    </div>
                `).join('');

            return `
                <div class="category-section">
                    <div class="category-header">
                        <div class="category-title">
                            <span class="category-icon">${info.icon}</span>
                            <span class="category-name">${categoryName}</span>
                        </div>
                        <span class="category-count">${products.length} 款产品</span>
                    </div>
                    ${bandsHTML}
                </div>
            `;
        }

        function renderProductCard(product) {
            const brandClass = (product.brand || 'eufy').toLowerCase().replace(' ', '-');
            const hasDiscount = product.was_price && product.was_price > product.price;
            const priceClass = hasDiscount ? '' : 'no-discount';

            return `
                <div class="product-card ${brandClass}" onclick="window.open('${product.url}', '_blank')">
                    <div class="product-top">
                        <span class="brand-badge ${brandClass}">${product.brand || 'eufy'}</span>
                        ${hasDiscount ? `<span class="discount-badge">${product.discount_percent}% OFF</span>` : ''}
                    </div>
                    <div class="product-name">${product.name}</div>
                    <div class="product-bottom">
                        <div class="product-meta">JB Hi-Fi</div>
                        <div class="product-prices">
                            ${hasDiscount ? `<div class="price-was">$${product.was_price.toFixed(0)}</div>` : ''}
                            <div class="price-current ${priceClass}">$${product.price.toFixed(0)}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderDashboard(data) {

            const statsHTML = '<div class="stats"></div>';

                document.getElementById('timestamp').textContent = `📅 最后更新: ${updateTime}`;
            }
        }

    <script>
        // Tab 切换函数
        function switchTab(tabName) {
            // 隐藏所有 Tab
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // 显示选中的 Tab
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');

            // 如果切换到价格追踪，加载数据
            if (tabName === 'tracker' && !window.trackerLoaded) {
                loadTrackerData();
                window.trackerLoaded = true;
            }
        }

        // 价格追踪功能
        let trackerAllProducts = [];
        let trackerHistory = {};
        let trackerSelectedProducts = [];
        let trackerChart = null;
        const trackerColors = ['#3498db', '#2ecc71', '#e74c3c', '#f39c12', '#9b59b6'];
        let trackerFilters = {
            brand: 'all',
            category: 'all',
            status: 'all'
        };

        // 加载数据
        async function loadTrackerData() {
            try {
                // 加载价格历史数据
                const historyResponse = await fetch('price_history.json');
                trackerHistory = await historyResponse.json();

                // 加载最新产品数据
                const productsResponse = await fetch('price_results_latest.json');
                const rawProducts = await productsResponse.json();

                // 标准化产品数据格式并添加ID
                trackerAllProducts = rawProducts.map(product => {
                    // 根据产品名称和品牌生成ID（与price_history的key匹配）
                    const id = (product.brand + '_' + product.name)
                        .toLowerCase()
                        .replace(/[^a-z0-9]+/g, '_')
                        .replace(/^_+|_+$/g, '');

                    // 从price_history获取is_on_sale信息
                    let isOnSale = false;
                    if (trackerHistory[id] && trackerHistory[id].price_history.length > 0) {
                        const latestHistory = trackerHistory[id].price_history[trackerHistory[id].price_history.length - 1];
                        isOnSale = latestHistory.is_on_sale || false;
                    }

                    return {
                        id: id,
                        product_name: product.name,
                        brand: product.brand,
                        category: product.category,
                        url: product.url,
                        current_price: product.price,
                        is_on_sale: isOnSale
                    };
                });

                // 更新顶部横幅数据
                updateBannerInfo();

                // 初始化筛选器
                initTrackerFilters();

                // 渲染产品卡片
                renderTrackerProducts();
            } catch (error) {
                console.error('数据加载失败:', error);
                document.getElementById('tracker-productCards').innerHTML = `
                    <div style="padding: 40px; text-align: center; color: #e74c3c; grid-column: 1 / -1;">
                        <p style="font-size: 18px; margin-bottom: 10px;">⚠️ 数据加载失败</p>
                        <p style="font-size: 14px; color: #666;">${error.message}</p>
                    </div>
                `;
            }
        }

        // 初始化筛选器
        function initTrackerFilters() {
            // 获取所有唯一的品牌和类别
            const brands = [...new Set(trackerAllProducts.map(p => p.brand))].sort();
            const categories = [...new Set(trackerAllProducts.map(p => p.category))].sort();

            // 渲染品牌筛选按钮
            const brandFiltersContainer = document.getElementById('trackerBrandFilters');
            brandFiltersContainer.innerHTML = `
                <button class="filter-btn active" data-brand="all">全部品牌</button>
                ${brands.map(brand => `<button class="filter-btn" data-brand="${brand}">${brand}</button>`).join('')}
            `;

            // 渲染类别筛选按钮
            const categoryFiltersContainer = document.getElementById('trackerCategoryFilters');
            categoryFiltersContainer.innerHTML = `
                <button class="filter-btn active" data-category="all">全部类别</button>
                ${categories.map(category => `<button class="filter-btn" data-category="${category}">${category}</button>`).join('')}
            `;

            // 绑定筛选事件
            brandFiltersContainer.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    brandFiltersContainer.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    trackerFilters.brand = this.dataset.brand;
                    applyTrackerFilters();
                });
            });

            categoryFiltersContainer.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    categoryFiltersContainer.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    trackerFilters.category = this.dataset.category;
                    applyTrackerFilters();
                });
            });

            document.getElementById('trackerStatusFilters').querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.getElementById('trackerStatusFilters').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    trackerFilters.status = this.dataset.status;
                    applyTrackerFilters();
                });
            });
        }

        // 应用筛选并重新渲染
        function applyTrackerFilters() {
            renderTrackerProducts();
        }

        // 获取筛选后的产品列表
        function getFilteredProducts() {
            return trackerAllProducts.filter(product => {
                // 品牌筛选
                if (trackerFilters.brand !== 'all' && product.brand !== trackerFilters.brand) {
                    return false;
                }

                // 类别筛选
                if (trackerFilters.category !== 'all' && product.category !== trackerFilters.category) {
                    return false;
                }

                // 状态筛选
                if (trackerFilters.status === 'on-sale' && !product.is_on_sale) {
                    return false;
                }

                return true;
            });
        }

        // 更新顶部横幅信息
        function updateBannerInfo() {
            // 计算最新更新时间和累计天数
            let latestDate = null;
            let earliestDate = null;

            Object.values(trackerHistory).forEach(product => {
                if (product.price_history && product.price_history.length > 0) {
                    product.price_history.forEach(record => {
                        const date = new Date(record.date);
                        if (!latestDate || date > latestDate) latestDate = date;
                        if (!earliestDate || date < earliestDate) earliestDate = date;
                    });
                }
            });

            if (latestDate) {
                const year = latestDate.getFullYear();
                const month = String(latestDate.getMonth() + 1).padStart(2, '0');
                const day = String(latestDate.getDate()).padStart(2, '0');
                const hours = String(latestDate.getHours()).padStart(2, '0');
                const minutes = String(latestDate.getMinutes()).padStart(2, '0');
                document.getElementById('lastUpdateTime').textContent = `${year}-${month}-${day} ${hours}:${minutes}`;
            }

            if (earliestDate && latestDate) {
                const daysDiff = Math.floor((latestDate - earliestDate) / (1000 * 60 * 60 * 24)) + 1;
                document.getElementById('totalDays').textContent = daysDiff;
            }
        }

        // 渲染产品卡片
        function renderTrackerProducts() {
            const container = document.getElementById('tracker-productCards');
            const filteredProducts = getFilteredProducts();

            // 更新产品数量显示
            document.getElementById('tracker-product-count').textContent = filteredProducts.length;

            if (trackerAllProducts.length === 0) {
                container.innerHTML = `
                    <div style="padding: 40px; text-align: center; color: #95a5a6; grid-column: 1 / -1;">
                        <p style="font-size: 18px;">😊 暂无产品数据</p>
                    </div>
                `;
                return;
            }

            if (filteredProducts.length === 0) {
                container.innerHTML = `
                    <div style="padding: 40px; text-align: center; color: #95a5a6; grid-column: 1 / -1;">
                        <p style="font-size: 18px;">😊 没有符合筛选条件的产品</p>
                        <p style="font-size: 14px; color: #666; margin-top: 10px;">请调整筛选条件</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredProducts.map(product => {
                const isSelected = trackerSelectedProducts.some(p => p.id === product.id);
                const hasHistory = trackerHistory[product.id] && trackerHistory[product.id].price_history.length > 0;

                return `
                    <div class="tracker-card ${isSelected ? 'selected' : ''}"
                         onclick="toggleProductSelection('${product.id}')"
                         style="${!hasHistory ? 'opacity: 0.5; cursor: not-allowed;' : ''}">
                        <div class="tracker-card-header">
                            <a href="${product.url}"
                               target="_blank"
                               class="tracker-card-title"
                               style="text-decoration: none; color: inherit; cursor: pointer;"
                               onclick="event.stopPropagation();">${product.product_name}</a>
                            <div class="tracker-card-checkbox"></div>
                        </div>
                        <div class="tracker-card-info">
                            <span>🏷️ ${product.brand}</span>
                            <span>📦 ${product.category}</span>
                        </div>
                        <div class="tracker-card-price ${product.is_on_sale ? 'on-sale' : ''}">
                            $${product.current_price}${product.is_on_sale ? ' 🔥' : ''}
                        </div>
                        ${!hasHistory ? '<div style="font-size: 11px; color: #e74c3c; margin-top: 5px;">⚠️ 暂无历史数据</div>' : ''}
                    </div>
                `;
            }).join('');
        }

        // 切换产品选择
        function toggleProductSelection(productId) {
            const product = trackerAllProducts.find(p => p.id === productId);
            const hasHistory = trackerHistory[productId] && trackerHistory[productId].price_history.length > 0;

            if (!product || !hasHistory) return;

            const index = trackerSelectedProducts.findIndex(p => p.id === productId);

            if (index > -1) {
                // 取消选择
                trackerSelectedProducts.splice(index, 1);
            } else {
                // 添加选择（最多5个）
                if (trackerSelectedProducts.length >= 5) {
                    alert('最多只能同时对比5个产品');
                    return;
                }
                trackerSelectedProducts.push(product);
            }

            // 重新渲染产品卡片
            renderTrackerProducts();

            // 更新图表
            updateTrackerChart();

            // 显示/隐藏导出按钮
            document.getElementById('export-buttons').style.display =
                trackerSelectedProducts.length > 0 ? 'flex' : 'none';
        }

        // 更新图表
        function updateTrackerChart() {
            const container = document.getElementById('tracker-chartContainer');

            if (trackerSelectedProducts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📈</div>
                        <p>请选择产品开始追踪价格变化</p>
                    </div>
                `;
                if (trackerChart) {
                    trackerChart.destroy();
                    trackerChart = null;
                }
                return;
            }

            // 创建canvas（如果不存在）
            if (!container.querySelector('canvas')) {
                container.innerHTML = '<canvas id="trackerPriceChart"></canvas>';
            }

            const ctx = document.getElementById('trackerPriceChart').getContext('2d');

            // 准备数据集
            const datasets = trackerSelectedProducts.map((product, index) => {
                const history = trackerHistory[product.id];
                const data = history.price_history.map(record => ({
                    x: new Date(record.date),
                    y: record.price
                }));

                return {
                    label: product.product_name,
                    data: data,
                    borderColor: trackerColors[index % trackerColors.length],
                    backgroundColor: trackerColors[index % trackerColors.length] + '20',
                    borderWidth: 3,
                    fill: false,
                    tension: 0.1,
                    pointRadius: 4,
                    pointHoverRadius: 6
                };
            });

            // 销毁旧图表
            if (trackerChart) {
                trackerChart.destroy();
            }

            // 创建新图表
            trackerChart = new Chart(ctx, {
                type: 'line',
                data: { datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: {
                            display: true,
                            text: '价格趋势对比',
                            font: { size: 18, weight: 'bold' },
                            color: '#2c3e50'
                        },
                        legend: {
                            display: true,
                            position: 'top',
                            labels: {
                                font: { size: 12 },
                                padding: 15,
                                usePointStyle: true
                            }
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': $' + context.parsed.y.toFixed(2);
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                unit: 'day',
                                displayFormats: {
                                    day: 'MM/dd'
                                }
                            },
                            title: {
                                display: true,
                                text: '日期',
                                font: { size: 14, weight: 'bold' }
                            }
                        },
                        y: {
                            beginAtZero: false,
                            title: {
                                display: true,
                                text: '价格 (AUD)',
                                font: { size: 14, weight: 'bold' }
                            },
                            ticks: {
                                callback: function(value) {
                                    return '$' + value.toFixed(2);
                                }
                            }
                        }
                    },
                    interaction: {
                        mode: 'nearest',
                        axis: 'x',
                        intersect: false
                    }
                }
            });

            // 设置图表容器高度
            container.style.height = '500px';
        }

        // 导出数据
        function exportData(format) {
            if (trackerSelectedProducts.length === 0) {
                alert('请先选择要导出的产品');
                return;
            }

            let exportContent, filename, mimeType;

            if (format === 'json') {
                const exportData = {};
                trackerSelectedProducts.forEach(product => {
                    exportData[product.id] = {
                        product_name: product.product_name,
                        brand: product.brand,
                        category: product.category,
                        url: product.url,
                        price_history: trackerHistory[product.id].price_history
                    };
                });
                exportContent = JSON.stringify(exportData, null, 2);
                filename = 'price_data_' + new Date().toISOString().split('T')[0] + '.json';
                mimeType = 'application/json';
            } else if (format === 'csv') {
                const lines = ['产品名称,品牌,品类,日期,价格,原价,是否促销,折扣百分比'];

                trackerSelectedProducts.forEach(product => {
                    const history = trackerHistory[product.id].price_history;
                    history.forEach(record => {
                        lines.push([
                            `"${product.product_name}"`,
                            product.brand,
                            product.category,
                            record.date,
                            record.price,
                            record.original_price || record.price,
                            record.is_on_sale ? '是' : '否',
                            record.discount_percentage || 0
                        ].join(','));
                    });
                });

                exportContent = lines.join('\n');
                filename = 'price_data_' + new Date().toISOString().split('T')[0] + '.csv';
                mimeType = 'text/csv';
            }

            // 创建下载
            const blob = new Blob(['\ufeff' + exportContent], { type: mimeType + ';charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

    </script>

    <script>
        // 页面加载时自动初始化tracker数据
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                console.log('🚀 自动加载tracker数据...');
                loadTrackerData();
                window.trackerLoaded = true;
            });
        } else {
            // DOMContentLoaded已经触发
            console.log('🚀 页面已加载，立即加载tracker数据...');
            loadTrackerData();
            window.trackerLoaded = true;
        }
    </script>
